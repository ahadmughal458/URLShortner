<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener | Portfolio Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #e6edf3;
        }

        .container {
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid #30363d;
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #3fb950);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8b949e;
            font-size: 15px;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 14px 18px;
            background: #0d1117;
            border: 2px solid #30363d;
            border-radius: 12px;
            color: #e6edf3;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            min-width: 200px;
        }

        input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        input::placeholder {
            color: #484f58;
        }

        button {
            padding: 14px 32px;
            background: linear-gradient(135deg, #238636, #2ea043);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(46, 160, 67, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
            display: none;
            animation: slideUp 0.4s ease;
        }

        .result.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-label {
            color: #8b949e;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .result-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
            padding: 12px;
            background: #161b22;
            border-radius: 8px;
            border: 1px solid #21262d;
        }

        .result-link a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 16px;
            word-break: break-all;
            flex: 1;
            font-weight: 500;
        }

        .result-link a:hover {
            text-decoration: underline;
            color: #79c0ff;
        }

        .copy-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .copy-btn:hover {
            background: #30363d;
            border-color: #484f58;
            color: #f0f6fc;
        }

        .copy-btn.copied {
            background: #1f3a2b;
            border-color: #2ea043;
            color: #b7e4c7;
        }

        .original-url {
            margin-top: 12px;
            font-size: 13px;
            color: #8b949e;
            word-break: break-all;
        }

        .original-url span {
            color: #484f58;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #21262d;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #f0f6fc;
            display: block;
        }

        .stat-label {
            font-size: 13px;
            color: #8b949e;
            margin-top: 4px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            color: #f85149;
            background: rgba(248, 81, 73, 0.1);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(248, 81, 73, 0.2);
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #484f58;
            font-size: 13px;
        }

        .footer a {
            color: #58a6ff;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .container {
                padding: 30px 20px;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
                justify-content: center;
            }

            .stats {
                gap: 20px;
                flex-wrap: wrap;
            }

            .result-link {
                flex-direction: column;
                align-items: stretch;
            }

            .copy-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <span class="logo">🔗</span>
            <h1>URL Shortener</h1>
            <p class="subtitle">Shorten your URLs instantly with TinyURL API</p>
        </div>

        <!-- Input Section -->
        <div class="input-group">
            <input type="url" id="urlInput" placeholder="Enter your long URL (e.g., https://google.com)" spellcheck="false">
            <button id="shortenBtn">🚀 Shorten</button>
        </div>

        <!-- Error Message -->
        <div class="error" id="error"></div>

        <!-- Result Section -->
        <div class="result" id="result">
            <div class="result-label">✨ Your Short URL</div>
            <div class="result-link">
                <a href="#" id="shortLink" target="_blank"></a>
                <button class="copy-btn" id="copyBtn">📋 Copy</button>
            </div>
            <div class="original-url">
                Original: <span id="originalUrl"></span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalCount">0</span>
                <span class="stat-label">Total Shortened</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="todayCount">0</span>
                <span class="stat-label">Today</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            Built with ❤️ using TinyURL API · <a href="https://github.com/ahadmughal458/URLShortner" target="_blank">View on GitHub</a>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // DOM Elements
            const urlInput = document.getElementById('urlInput');
            const shortenBtn = document.getElementById('shortenBtn');
            const resultDiv = document.getElementById('result');
            const shortLink = document.getElementById('shortLink');
            const copyBtn = document.getElementById('copyBtn');
            const originalUrl = document.getElementById('originalUrl');
            const totalCount = document.getElementById('totalCount');
            const todayCount = document.getElementById('todayCount');
            const errorDiv = document.getElementById('error');

            // Statistics
            let stats = {
                total: 0,
                today: 0,
                history: []
            };

            // Load stats from localStorage
            function loadStats() {
                try {
                    const saved = localStorage.getItem('urlShortenerStats');
                    if (saved) {
                        stats = JSON.parse(saved);
                        updateStats();
                    }
                } catch (e) {
                    console.log('No saved stats');
                }
            }

            // Save stats to localStorage
            function saveStats() {
                try {
                    localStorage.setItem('urlShortenerStats', JSON.stringify(stats));
                } catch (e) {
                    console.log('Could not save stats');
                }
            }

            // Update stats display
            function updateStats() {
                totalCount.textContent = stats.total || 0;
                // Check if today's date matches
                const today = new Date().toDateString();
                if (stats.lastDate !== today) {
                    stats.today = 0;
                    stats.lastDate = today;
                    saveStats();
                }
                todayCount.textContent = stats.today || 0;
            }

            // Show error message
            function showError(message) {
                errorDiv.textContent = message;
                errorDiv.classList.add('show');
                setTimeout(() => {
                    errorDiv.classList.remove('show');
                }, 4000);
            }

            // Shorten URL using TinyURL API
            async function shortenUrl() {
                let longUrl = urlInput.value.trim();

                // Validate input
                if (!longUrl) {
                    showError('Please enter a URL');
                    return;
                }

                // Add protocol if missing
                if (!longUrl.startsWith('http://') && !longUrl.startsWith('https://')) {
                    longUrl = 'https://' + longUrl;
                }

                // Validate URL
                try {
                    new URL(longUrl);
                } catch (e) {
                    showError('Invalid URL format. Please enter a valid URL.');
                    return;
                }

                // Disable button and show loading
                shortenBtn.disabled = true;
                shortenBtn.innerHTML = '<span class="loading"></span> Shortening...';

                try {
                    // Call TinyURL API
                    const response = await fetch(
                        `https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`
                    );

                    if (!response.ok) {
                        throw new Error('API request failed');
                    }

                    const shortUrl = await response.text();

                    // Check if response is valid
                    if (!shortUrl || shortUrl.includes('Error')) {
                        throw new Error('Invalid response from API');
                    }

                    // Display result
                    shortLink.textContent = shortUrl;
                    shortLink.href = shortUrl;
                    originalUrl.textContent = longUrl;
                    resultDiv.classList.add('show');

                    // Update stats
                    stats.total = (stats.total || 0) + 1;
                    stats.today = (stats.today || 0) + 1;
                    stats.lastDate = new Date().toDateString();
                    saveStats();
                    updateStats();

                    // Clear input
                    urlInput.value = '';
                    urlInput.focus();

                } catch (error) {
                    console.error('Error:', error);
                    showError('Failed to shorten URL. Please try again later.');
                } finally {
                    // Re-enable button
                    shortenBtn.disabled = false;
                    shortenBtn.innerHTML = '🚀 Shorten';
                }
            }

            // Copy to clipboard
            function copyLink() {
                const text = shortLink.textContent;
                if (!text || text === '') return;

                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.textContent = '✅ Copied!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.textContent = '📋 Copy';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                }).catch(() => {
                    // Fallback for older browsers
                    const input = document.createElement('input');
                    input.value = text;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                    copyBtn.textContent = '✅ Copied!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.textContent = '📋 Copy';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                });
            }

            // Event Listeners
            shortenBtn.addEventListener('click', shortenUrl);
            urlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    shortenUrl();
                }
            });
            copyBtn.addEventListener('click', copyLink);

            // Initialize
            loadStats();

            // Focus input on load
            urlInput.focus();

            console.log('✅ URL Shortener ready!');
            console.log(`📊 Total links: ${stats.total || 0}`);
        })();
    </script>
</body>
</html>
