<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener - Working</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #58a6ff, #3fb950);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #58a6ff;
        }
        button {
            padding: 12px 24px;
            background: #238636;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 16px;
        }
        button:hover {
            background: #2ea043;
        }
        .result {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result a {
            color: #58a6ff;
            text-decoration: none;
            word-break: break-all;
        }
        .result a:hover {
            text-decoration: underline;
        }
        .copy-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 14px;
        }
        .copy-btn:hover {
            background: #30363d;
        }
        .stats {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #21262d;
            color: #8b949e;
            font-size: 14px;
        }
        .stats span {
            margin-right: 20px;
        }
        .stats strong {
            color: #e6edf3;
        }
        .error {
            color: #f85149;
            font-size: 14px;
            margin-top: 10px;
        }
        .redirect-section {
            margin-top: 30px;
            padding: 20px;
            background: #0d1117;
            border-radius: 8px;
            border: 1px dashed #30363d;
        }
        .redirect-section h3 {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .redirect-section code {
            background: #161b22;
            padding: 8px 12px;
            border-radius: 4px;
            display: block;
            color: #f0f6fc;
            font-size: 13px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 URL Shortener</h1>
        <p class="subtitle">Working version with real redirects</p>

        <div class="input-group">
            <input type="url" id="urlInput" placeholder="https://github.com/your/repo" spellcheck="false">
            <button id="shortenBtn">Shorten</button>
        </div>

        <div id="error" class="error"></div>

        <div class="result" id="result">
            <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 10px;">
                <strong style="color: #8b949e;">Short URL:</strong>
                <a href="#" id="shortLink" target="_blank"></a>
                <button class="copy-btn" id="copyBtn">Copy</button>
            </div>
            <div style="margin-top: 8px; font-size: 13px; color: #8b949e;">
                Original: <span id="originalUrl"></span>
            </div>
        </div>

        <div class="stats">
            <span>📊 Total links: <strong id="totalCount">0</strong></span>
            <span>📁 Repos: <strong id="repoCount">0</strong></span>
        </div>

        <div class="redirect-section">
            <h3>📌 How it works:</h3>
            <code>
                Visit: <span id="exampleLink">https://your-site.com/#abc123</span><br>
                → Redirects to your original URL instantly
            </code>
        </div>
    </div>

    <script>
        (function() {
            // Store links in memory
            let links = new Map();
            let totalLinks = 0;

            // DOM elements
            const urlInput = document.getElementById('urlInput');
            const shortenBtn = document.getElementById('shortenBtn');
            const resultDiv = document.getElementById('result');
            const shortLink = document.getElementById('shortLink');
            const copyBtn = document.getElementById('copyBtn');
            const originalUrl = document.getElementById('originalUrl');
            const totalCount = document.getElementById('totalCount');
            const repoCount = document.getElementById('repoCount');
            const errorDiv = document.getElementById('error');
            const exampleLink = document.getElementById('exampleLink');

            // Generate random short code
            function generateCode(length = 6) {
                const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let code = '';
                for (let i = 0; i < length; i++) {
                    code += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return code;
            }

            // Extract repo name from GitHub URL
            function extractRepo(url) {
                try {
                    const parsed = new URL(url);
                    if (parsed.hostname === 'github.com' || parsed.hostname === 'www.github.com') {
                        const parts = parsed.pathname.split('/').filter(p => p);
                        if (parts.length >= 2) {
                            return parts[0] + '/' + parts[1];
                        }
                    }
                    return null;
                } catch {
                    return null;
                }
            }

            // Update stats
            function updateStats() {
                totalCount.textContent = links.size;
                const repos = new Set();
                for (const entry of links.values()) {
                    if (entry.repo) repos.add(entry.repo);
                }
                repoCount.textContent = repos.size;
            }

            // Show error
            function showError(msg) {
                errorDiv.textContent = msg;
                setTimeout(() => errorDiv.textContent = '', 3000);
            }

            // Shorten URL
            function shortenUrl() {
                let rawUrl = urlInput.value.trim();
                if (!rawUrl) {
                    showError('Please enter a URL');
                    return;
                }

                // Add https:// if missing
                if (!rawUrl.startsWith('http://') && !rawUrl.startsWith('https://')) {
                    rawUrl = 'https://' + rawUrl;
                }

                let validUrl;
                try {
                    validUrl = new URL(rawUrl);
                } catch {
                    showError('Invalid URL format');
                    return;
                }

                // Generate unique code
                let code;
                let attempts = 0;
                do {
                    code = generateCode(6);
                    attempts++;
                    if (attempts > 10) {
                        code = generateCode(8) + Date.now().toString(36).slice(-3);
                        break;
                    }
                } while (links.has(code));

                // Save link
                const repo = extractRepo(validUrl.href);
                links.set(code, {
                    long: validUrl.href,
                    repo: repo || 'other',
                    created: Date.now()
                });

                // Build short URL
                const shortUrl = window.location.origin + window.location.pathname + '#' + code;

                // Display result
                shortLink.textContent = shortUrl;
                shortLink.href = shortUrl;
                originalUrl.textContent = validUrl.href;
                resultDiv.classList.add('show');

                // Update stats
                updateStats();

                // Clear input
                urlInput.value = '';
                urlInput.focus();

                // Update example
                exampleLink.textContent = shortUrl;
            }

            // Copy to clipboard
            function copyLink() {
                const text = shortLink.textContent;
                if (!text || text === '') return;

                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => copyBtn.textContent = 'Copy', 2000);
                }).catch(() => {
                    // Fallback
                    const input = document.createElement('input');
                    input.value = text;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => copyBtn.textContent = 'Copy', 2000);
                });
            }

            // Handle redirect from hash
            function handleRedirect() {
                const hash = window.location.hash.substring(1);
                if (hash && links.has(hash)) {
                    const entry = links.get(hash);
                    // Redirect to the original URL
                    window.location.href = entry.long;
                    return true;
                } else if (hash) {
                    // Unknown code - show message but don't redirect
                    document.body.innerHTML = `
                        <div style="display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0d1117;color:#e6edf3;font-family:sans-serif;flex-direction:column;gap:20px;">
                            <h1>🔗 Invalid Link</h1>
                            <p style="color:#8b949e;">The short code "${hash}" doesn't exist.</p>
                            <a href="${window.location.origin}${window.location.pathname}" style="color:#58a6ff;">Go to URL Shortener</a>
                        </div>
                    `;
                    return false;
                }
                return false;
            }

            // Load from localStorage
            function loadLinks() {
                try {
                    const stored = localStorage.getItem('shortLinks');
                    if (stored) {
                        const parsed = JSON.parse(stored);
                        links = new Map(Object.entries(parsed));
                        updateStats();

                        // Check if we need to redirect
                        if (window.location.hash) {
                            handleRedirect();
                            return true;
                        }
                    }
                } catch (e) {
                    console.log('No stored links');
                }
                return false;
            }

            // Save to localStorage
            function saveLinks() {
                try {
                    const obj = Object.fromEntries(links);
                    localStorage.setItem('shortLinks', JSON.stringify(obj));
                } catch (e) {
                    console.log('Could not save');
                }
            }

            // Override map methods to auto-save
            const originalSet = links.set.bind(links);
            links.set = function(key, value) {
                const result = originalSet(key, value);
                saveLinks();
                return result;
            };

            // Event listeners
            shortenBtn.addEventListener('click', shortenUrl);
            urlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') shortenUrl();
            });
            copyBtn.addEventListener('click', copyLink);

            // Initialize
            const redirected = loadLinks();

            // If no redirect happened, show normal UI
            if (!redirected) {
                // Update example link
                const dummyCode = generateCode(6);
                exampleLink.textContent = window.location.origin + window.location.pathname + '#' + dummyCode;
            }

            // Update stats on page load
            updateStats();

            console.log('✅ URL Shortener ready!');
            console.log(`📊 ${links.size} links stored`);
        })();
    </script>
</body>
</html>
