<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ RepoShort – URL shortener for GitHub</title>
  <!-- Font & minimal reset -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0d1117 0%, #161b22 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 1.5rem;
      color: #e6edf3;
    }

    .card {
      max-width: 640px;
      width: 100%;
      background: rgba(22, 27, 34, 0.8);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid #30363d;
      border-radius: 32px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(48, 54, 61, 0.3);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: scale(1.005);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-weight: 600;
      font-size: 1.9rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f0f6fc 0%, #8b949e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header span {
      background: #238636;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      color: #ffffff;
      letter-spacing: 0.3px;
      background: #2ea043;
      box-shadow: 0 0 8px rgba(46, 160, 67, 0.3);
    }

    .sub {
      color: #8b949e;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      border-left: 3px solid #2ea043;
      padding-left: 1rem;
      font-weight: 400;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.8rem;
    }

    .input-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 60px;
      padding: 0.2rem 0.2rem 0.2rem 1.5rem;
      transition: border 0.2s, box-shadow 0.2s;
    }

    .input-row:focus-within {
      border-color: #2ea043;
      box-shadow: 0 0 0 3px rgba(46, 160, 67, 0.25);
    }

    .input-row input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.9rem 0.2rem;
      font-size: 1rem;
      color: #f0f6fc;
      outline: none;
      font-family: 'Inter', sans-serif;
      min-width: 150px;
    }

    .input-row input::placeholder {
      color: #484f58;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .input-row button {
      background: #2ea043;
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.2px;
    }

    .input-row button:hover {
      background: #3fb950;
    }

    .input-row button:active {
      transform: scale(0.95);
    }

    .input-row button:disabled {
      opacity: 0.6;
      pointer-events: none;
      filter: grayscale(0.3);
    }

    .short-output {
      background: #0d1117;
      border-radius: 40px;
      padding: 0.5rem 0.5rem 0.5rem 1.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #30363d;
      margin-top: 0.5rem;
      min-height: 68px;
      transition: border 0.2s;
    }

    .short-output a {
      color: #58a6ff;
      text-decoration: none;
      font-weight: 500;
      word-break: break-all;
      font-size: 1rem;
      transition: color 0.2s;
    }

    .short-output a:hover {
      color: #79c0ff;
      text-decoration: underline;
    }

    .copy-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 0.5rem 1.4rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, border 0.2s;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
      margin: 0.2rem;
    }

    .copy-btn:hover {
      background: #30363d;
      border-color: #484f58;
      color: #f0f6fc;
    }

    .copy-btn.copied {
      background: #1f3a2b;
      border-color: #2ea043;
      color: #b7e4c7;
    }

    .stats {
      display: flex;
      justify-content: flex-start;
      gap: 2rem;
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #8b949e;
      border-top: 1px solid #21262d;
      padding-top: 1.5rem;
    }

    .stats span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stats strong {
      color: #e6edf3;
      font-weight: 600;
      background: #161b22;
      padding: 0.1rem 0.7rem;
      border-radius: 40px;
      font-size: 0.9rem;
      border: 1px solid #30363d;
    }

    .footnote {
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: #484f58;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .footnote i {
      font-style: normal;
      background: #1c2128;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      border: 1px solid #30363d;
    }

    /* empty state */
    .empty-state {
      opacity: 0.5;
      font-weight: 400;
    }

    @media (max-width: 500px) {
      .card { padding: 1.5rem; }
      .input-row { border-radius: 40px; padding-left: 1rem; }
      .input-row button { padding: 0.6rem 1.2rem; font-size: 0.9rem; }
      .short-output { flex-direction: column; align-items: stretch; gap: 0.7rem; padding: 1rem; }
      .copy-btn { width: 100%; justify-content: center; }
      .header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>📎 RepoShort</h1>
      <span>GitHub</span>
    </div>
    <div class="sub">
      ⚡ Shorten any URL – ready for your repo, README, or bio.
    </div>

    <!-- main input -->
    <div class="input-group">
      <div class="input-row">
        <input type="url" id="longUrlInput" placeholder="https://github.com/your/repo" spellcheck="false" autofocus>
        <button id="shortenBtn">✦ Shorten</button>
      </div>
    </div>

    <!-- output area -->
    <div class="short-output" id="outputArea">
      <a href="#" id="shortLink" target="_blank" class="empty-state">your.short/url</a>
      <button class="copy-btn" id="copyBtn">📋 Copy</button>
    </div>

    <!-- stats (fake store) -->
    <div class="stats">
      <span>🔗 <strong id="totalCount">0</strong> shortened</span>
      <span>📁 <strong id="repoCount">0</strong> repos</span>
    </div>
    <div class="footnote">
      <i>✨ stored in memory · refresh keeps your links</i>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ----- in‑memory store (simulates a lightweight repo) -----
      let urlMap = new Map();          // shortCode -> { long, created, repo }
      let totalShortened = 0;

      // ----- DOM refs -----
      const longInput = document.getElementById('longUrlInput');
      const shortenBtn = document.getElementById('shortenBtn');
      const shortLink = document.getElementById('shortLink');
      const copyBtn = document.getElementById('copyBtn');
      const totalCount = document.getElementById('totalCount');
      const repoCount = document.getElementById('repoCount');

      // ----- helper: generate short code (6 chars) -----
      function generateShortCode(length = 6) {
        const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < length; i++) {
          code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
      }

      // ----- extract repo name from GitHub URL (or return 'custom') -----
      function extractRepoName(url) {
        try {
          const parsed = new URL(url);
          // only if hostname is github.com or www.github.com
          if (parsed.hostname === 'github.com' || parsed.hostname === 'www.github.com') {
            const path = parsed.pathname.split('/').filter(seg => seg.length > 0);
            // path like /user/repo  or /user/repo/tree/...
            if (path.length >= 2) {
              return path[0] + '/' + path[1];   // "user/repo"
            }
          }
          return null;
        } catch (_) {
          return null;
        }
      }

      // ----- update stats UI -----
      function updateStats() {
        totalCount.textContent = totalShortened;
        // count unique repos (if any)
        const repos = new Set();
        for (const entry of urlMap.values()) {
          if (entry.repo) repos.add(entry.repo);
        }
        repoCount.textContent = repos.size || 0;
      }

      // ----- render short link (and store) -----
      function shortenUrl() {
        let rawUrl = longInput.value.trim();
        if (!rawUrl) {
          shortLink.textContent = '⚠️ enter a URL';
          shortLink.href = '#';
          shortLink.classList.add('empty-state');
          return;
        }

        // prepend https:// if missing (basic)
        if (!rawUrl.startsWith('http://') && !rawUrl.startsWith('https://')) {
          rawUrl = 'https://' + rawUrl;
        }

        let validUrl;
        try {
          validUrl = new URL(rawUrl);
        } catch (_) {
          shortLink.textContent = '❌ invalid URL';
          shortLink.href = '#';
          shortLink.classList.add('empty-state');
          return;
        }

        // generate unique short code (with collision check)
        let shortCode;
        let attempts = 0;
        do {
          shortCode = generateShortCode(6);
          attempts++;
          if (attempts > 20) {
            // fallback: add timestamp to avoid infinite loop
            shortCode = generateShortCode(8) + Date.now().toString(36).slice(-3);
            break;
          }
        } while (urlMap.has(shortCode));

        // extract repo info (if github)
        const repo = extractRepoName(validUrl.href);

        // store
        urlMap.set(shortCode, {
          long: validUrl.href,
          created: Date.now(),
          repo: repo || 'other'
        });
        totalShortened = urlMap.size;

        // build short link (using current origin + hash)
        const shortUrl = window.location.origin + window.location.pathname + '#' + shortCode;

        // display
        shortLink.textContent = shortUrl;
        shortLink.href = shortUrl;
        shortLink.classList.remove('empty-state');

        // update stats
        updateStats();

        // clear input (optional)
        longInput.value = '';
        longInput.focus();

        // copy button state reset
        copyBtn.textContent = '📋 Copy';
        copyBtn.classList.remove('copied');
      }

      // ----- copy to clipboard -----
      function copyShortLink() {
        const linkText = shortLink.textContent;
        if (!linkText || linkText.startsWith('⚠️') || linkText.startsWith('❌') || linkText === 'your.short/url') {
          copyBtn.textContent = '⚠️ nothing to copy';
          setTimeout(() => { copyBtn.textContent = '📋 Copy'; }, 1200);
          return;
        }

        navigator.clipboard.writeText(linkText).then(() => {
          copyBtn.textContent = '✅ copied!';
          copyBtn.classList.add('copied');
          setTimeout(() => {
            copyBtn.textContent = '📋 Copy';
            copyBtn.classList.remove('copied');
          }, 2000);
        }).catch(() => {
          // fallback
          const el = document.createElement('textarea');
          el.value = linkText;
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
          copyBtn.textContent = '📋 copied!';
          copyBtn.classList.add('copied');
          setTimeout(() => {
            copyBtn.textContent = '📋 Copy';
            copyBtn.classList.remove('copied');
          }, 2000);
        });
      }

      // ----- handle hash routing (resolve short link) -----
      function resolveHash() {
        const hash = window.location.hash.substring(1); // remove '#'
        if (hash && urlMap.has(hash)) {
          const entry = urlMap.get(hash);
          // display the short link in the output
          const shortUrl = window.location.origin + window.location.pathname + '#' + hash;
          shortLink.textContent = shortUrl;
          shortLink.href = shortUrl;
          shortLink.classList.remove('empty-state');
          // update stats (just in case)
          updateStats();
          // optional: redirect? we show the link, but we could also auto-redirect.
          // but we want to show it – we can also add a small note
          // we'll also fill the input with long url for convenience
          longInput.value = entry.long;
        } else if (hash) {
          // unknown hash
          shortLink.textContent = '❌ unknown short link';
          shortLink.href = '#';
          shortLink.classList.add('empty-state');
        }
      }

      // ----- load from localStorage (optional – keep between sessions) -----
      function loadFromStorage() {
        try {
          const stored = localStorage.getItem('repoShort_map');
          if (stored) {
            const parsed = JSON.parse(stored);
            if (typeof parsed === 'object' && parsed !== null) {
              urlMap = new Map(Object.entries(parsed));
              totalShortened = urlMap.size;
              updateStats();
              // if there is a hash, resolve it after load
              if (window.location.hash) {
                resolveHash();
              }
            }
          }
        } catch (_) { /* ignore */ }
      }

      // ----- save to localStorage (on every change) -----
      function persistToStorage() {
        try {
          const obj = Object.fromEntries(urlMap);
          localStorage.setItem('repoShort_map', JSON.stringify(obj));
        } catch (_) { /* ignore */ }
      }

      // ----- override map set to auto-persist -----
      const originalSet = urlMap.set.bind(urlMap);
      urlMap.set = function(key, value) {
        const result = originalSet(key, value);
        persistToStorage();
        return result;
      };

      // also when we delete (not used but safe)
      const originalDelete = urlMap.delete.bind(urlMap);
      urlMap.delete = function(key) {
        const result = originalDelete(key);
        persistToStorage();
        return result;
      };

      // ----- event listeners -----
      shortenBtn.addEventListener('click', shortenUrl);
      longInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          shortenUrl();
        }
      });
      copyBtn.addEventListener('click', copyShortLink);

      // handle hash change (browser back/forward)
      window.addEventListener('hashchange', resolveHash);

      // initial load
      loadFromStorage();

      // if no hash, show placeholder but keep stats
      if (!window.location.hash) {
        shortLink.textContent = 'your.short/url';
        shortLink.href = '#';
        shortLink.classList.add('empty-state');
      } else {
        resolveHash();
      }

      // Update stats after load
      updateStats();

      // extra: if there's a hash on load, resolve after storage loaded
      // (already called in loadFromStorage)
      console.log('✨ RepoShort ready · stored links:', urlMap.size);
    })();
  </script>
</body>
</html>
